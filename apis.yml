aid: costco
name: Costco Wholesale
x-type: company
description: >-
  Costco Wholesale Corporation is a Fortune 500 American multinational
  membership-only big-box retail chain that operates warehouse clubs offering
  a wide selection of merchandise at discounted prices. Costco does not
  publish a public developer API; supplier and trading partner integrations
  are conducted through EDI and B2B channels using ANSI X12 transactions and
  the Costco Supplier Portal. Costco operates an e-commerce site, the Costco
  Travel and Costco Pharmacy properties, and the Costco Photo Center.
